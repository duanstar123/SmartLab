<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>智慧实验室 - 用户注册</title>
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8f9fa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        .register-container {
            max-width: 600px;
            width: 100%;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            background-color: white;
        }
        .register-header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px 10px 0 0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #333;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .form-row {
            display: flex;
            gap: 15px;
        }
        .form-row .form-group {
            flex: 1;
        }
        .register-button {
            width: 100%;
            padding: 12px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 20px;
        }
        .register-button:hover {
            background-color: #5a6fd8;
        }
        .login-link {
            text-align: center;
            margin-top: 15px;
            color: #666;
            font-size: 14px;
        }
        .login-link a {
            color: #667eea;
            text-decoration: none;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }
        .success-message {
            background-color: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="register-container">
    <div class="register-header">
        <h2>智慧实验室</h2>
        <p>用户注册</p>
    </div>

    <form id="registerForm">
        <div class="form-row">
            <div class="form-group">
                <label for="studentId">学号 <span style="color: red;">*</span></label>
                <input type="text" id="studentId" placeholder="请输入学号" required>
            </div>
            <div class="form-group">
                <label for="name">姓名 <span style="color: red;">*</span></label>
                <input type="text" id="name" placeholder="请输入姓名" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="gender">性别 <span style="color: red;">*</span></label>
                <select id="gender" required>
                    <option value="">请选择性别</option>
                    <option value="男">男</option>
                    <option value="女">女</option>
                </select>
            </div>
            <div class="form-group">
                <label for="grade">年级 <span style="color: red;">*</span></label>
                <input type="text" id="grade" placeholder="如：2021级" required>
            </div>
        </div>

        <div class="form-group">
            <label for="collegeName">学院名称 <span style="color: red;">*</span></label>
            <input type="text" id="collegeName" placeholder="请输入学院名称" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="departmentName">系别名称 <span style="color: red;">*</span></label>
                <input type="text" id="departmentName" placeholder="请输入系别名称" required>
            </div>
            <div class="form-group">
                <label for="className">班级名称 <span style="color: red;">*</span></label>
                <input type="text" id="className" placeholder="请输入班级名称" required>
            </div>
        </div>

        <div class="form-group">
            <label for="password">密码 <span style="color: red;">*</span></label>
            <input type="password" id="password" placeholder="请输入密码" required>
        </div>

        <div class="form-group">
            <label for="confirmPassword">确认密码 <span style="color: red;">*</span></label>
            <input type="password" id="confirmPassword" placeholder="请再次输入密码" required>
        </div>

        <button type="submit" class="register-button">注册</button>
    </form>

    <div class="login-link">
        已有账号？<a href="Login.html">立即登录</a>
    </div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();

        // 获取表单数据
        var studentId = document.getElementById('studentId').value;
        var name = document.getElementById('name').value;
        var gender = document.getElementById('gender').value;
        var grade = document.getElementById('grade').value;
        var collegeName = document.getElementById('collegeName').value;
        var departmentName = document.getElementById('departmentName').value;
        var className = document.getElementById('className').value;
        var password = document.getElementById('password').value;
        var confirmPassword = document.getElementById('confirmPassword').value;

        // 验证密码是否一致
        if (password !== confirmPassword) {
            alert('两次输入的密码不一致');
            return;
        }

        // 验证密码长度
        if (password.length < 6) {
            alert('密码长度至少为6位');
            return;
        }

        // 构建请求参数
        var params = 'studentId=' + encodeURIComponent(studentId) +
            '&name=' + encodeURIComponent(name) +
            '&gender=' + encodeURIComponent(gender) +
            '&grade=' + encodeURIComponent(grade) +
            '&collegeName=' + encodeURIComponent(collegeName) +
            '&departmentName=' + encodeURIComponent(departmentName) +
            '&className=' + encodeURIComponent(className) +
            '&password=' + encodeURIComponent(password);

        // 发送注册请求
        window.location.href = '/user/register?' + params;
    });
</script>
</body>
</html>
