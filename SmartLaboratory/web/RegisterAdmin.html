<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>管理员注册 - 智慧实验室</title>
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8f9fa;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .register-container {
            max-width: 500px;
            width: 100%;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            background-color: white;
        }
        .register-header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px 10px 0 0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
        }
        .register-button {
            width: 100%;
            padding: 12px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .register-button:hover {
            background-color: #5a6fd8;
        }
        .login-link {
            text-align: center;
            margin-top: 15px;
        }
        .login-link a {
            color: #667eea;
            text-decoration: none;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
<div class="register-container">
    <div class="register-header">
        <h2>智慧实验室</h2>
        <p>管理员注册</p>
    </div>

    <div class="error-message" id="errorMsg"></div>

    <div class="form-group">
        <label for="adminId">管理员ID</label>
        <input type="text" id="adminId" placeholder="请输入管理员ID">
    </div>

    <div class="form-group">
        <label for="username">管理员姓名</label>
        <input type="text" id="username" placeholder="请输入管理员姓名">
    </div>

    <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" placeholder="请输入密码">
    </div>

    <div class="form-group">
        <label for="confirmPassword">确认密码</label>
        <input type="password" id="confirmPassword" placeholder="请再次输入密码">
    </div>

    <div class="form-group">
        <label for="phone">联系电话</label>
        <input type="text" id="phone" placeholder="请输入联系电话（选填）">
    </div>

    <div class="form-group">
        <label for="email">邮箱</label>
        <input type="text" id="email" placeholder="请输入邮箱（选填）">
    </div>

    <button class="register-button" onclick="registerAdmin()">注册</button>

    <div class="login-link">
        已有账号？<a href="Login.html">立即登录</a>
    </div>
</div>

<script>
    function registerAdmin() {
        var adminId = document.getElementById('adminId').value;
        var username = document.getElementById('username').value;
        var password = document.getElementById('password').value;
        var confirmPassword = document.getElementById('confirmPassword').value;
        var phone = document.getElementById('phone').value;
        var email = document.getElementById('email').value;
        var errorMsg = document.getElementById('errorMsg');

        // 验证必填字段
        if (!adminId || !username || !password) {
            errorMsg.textContent = '请填写所有必填字段（管理员ID、管理员姓名、密码）';
            errorMsg.style.display = 'block';
            return;
        }

        // 验证密码一致性
        if (password !== confirmPassword) {
            errorMsg.textContent = '两次输入的密码不一致';
            errorMsg.style.display = 'block';
            return;
        }

        // 验证密码长度
        if (password.length < 6) {
            errorMsg.textContent = '密码长度至少为6位';
            errorMsg.style.display = 'block';
            return;
        }

        // 清空错误信息
        errorMsg.style.display = 'none';

        // 构建请求URL
        var url = '/admin/register?' +
            'adminId=' + encodeURIComponent(adminId) +
            '&username=' + encodeURIComponent(username) +
            '&password=' + encodeURIComponent(password) +
            '&phone=' + encodeURIComponent(phone) +
            '&email=' + encodeURIComponent(email);

        // 跳转到注册处理路径
        window.location.href = url;
    }
</script>
</body>
</html>
